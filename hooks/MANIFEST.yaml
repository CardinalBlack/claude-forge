# Declarative list of bootstrap hooks for ~/.claude/settings.json composition.
#
# Each entry maps a hook script in this directory to a Claude Code hook event,
# optionally with a `matcher` regex applied against the tool name.
#
# Events that take a matcher (matcher is required by Claude Code schema):
#   PreToolUse, PostToolUse
# Events that do NOT take a matcher (matcher field is omitted entirely):
#   UserPromptSubmit, Stop, PreCompact, SessionStart
#
# scripts/install-hooks.sh consumes this file and merges the entries into
# ~/.claude/settings.json idempotently.

hooks:
  - script: must-read-before-edit.sh
    event: PreToolUse
    matcher: "Edit|Write"
  - script: log-read-paths.sh
    event: PostToolUse
    matcher: "Read"
  - script: kill-switch.sh
    event: PreToolUse
    matcher: ".*"
  - script: inject-mistakes-and-dod.sh
    event: UserPromptSubmit
  - script: inject-session-state.sh
    event: UserPromptSubmit
  # block-direct-main-commit.sh is opt-in as of v1.1. Adds significant
  # friction for solo developers who own and merge all their own work. The
  # script + tests remain in the repo; uncomment this entry to re-enable.
  # - script: block-direct-main-commit.sh
  #   event: PreToolUse
  #   matcher: "Bash"
  - script: require-verification-before-done.sh
    event: Stop
  # Injection-defense layers (v1.2). All five fail-open and never block the
  # tool flow except where explicitly noted. CLI-only — none of these spend
  # API tokens (Layers 2 + 5 invoke `claude --print` against the user's
  # Max subscription; Layers 1 + 4 are pure bash/grep).
  - script: scan-commit-diff.sh        # Layer 1: pre-commit diff scanner
    event: PreToolUse
    matcher: "Bash"
  - script: summarize-commit-diff.sh   # Layer 2: plain-language pre-commit summary (claude -p)
    event: PreToolUse
    matcher: "Bash"
  - script: scan-tool-output.sh        # Layer 4: scan Read/WebFetch results for injection markers
    event: PostToolUse
    matcher: "Read|WebFetch"
  - script: risky-path-review.sh       # Layer 5: code-reviewer on RISKY-PATHS commits (claude -p)
    event: PreToolUse
    matcher: "Bash"
